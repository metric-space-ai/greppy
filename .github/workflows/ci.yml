name: CI

# Track C — CI + release-build battle/soak validation.
#
# Gates every push and pull request on:
#   * fast non-inference build/test/clippy with SHA-verified sentinel assets
#   * default product links with both real models on ELF, Mach-O, and PE/COFF
#   * cargo fmt    --check
#   * a --release build + the black-box battle suite
#     (bash bench/battle/run_battle.sh)
#
# The Rust toolchain is pinned by the repo's rust-toolchain.toml
# (channel 1.95.0, components rustfmt + clippy); we do NOT override the
# channel here so local and CI builds use the identical compiler.
#
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"

jobs:
  check:
    name: build / test / lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      GIT_LFS_SKIP_SMUDGE: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # This job intentionally does not fetch Git LFS. Its debug-only,
      # compile-guarded sentinel assets keep black-box CLI process startup
      # small; `real-assets-link` verifies the actual product payloads.

      # rust-toolchain.toml pins the channel + components; this action
      # reads it and installs exactly that toolchain. No `toolchain:`
      # override so the pin is the single source of truth.
      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry, git, and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-fast-assets-v1-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fast-assets-v1-

      # The battle scripts shell out to sqlite3 (PRAGMA integrity_check,
      # node/edge dumps). macOS runners ship it; Ubuntu needs the CLI.
      - name: Install sqlite3 (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version
          cargo clippy --version

      - name: cargo build --workspace (fast test assets)
        run: cargo build --workspace --features greppy/ci-test-assets

      # Several crates' unit tests mutate process-global env via set_var
      # (GREPPY_* config knobs). set_var is process-wide across the test
      # harness's parallel threads, so one test's override leaks into another
      # test's concurrent index()/discovery and skips files — intermittent
      # failures. Run unit tests single-threaded for deterministic results;
      # real concurrency is covered separately by bench/battle/concurrency.sh.
      - name: cargo test --workspace (single-threaded — env-var test isolation)
        run: cargo test --workspace --features greppy/ci-test-assets -- --test-threads=1

      - name: x86 portable CPU dispatch gate
        if: runner.os == 'Linux'
        env:
          EMBED_NATIVE_CPU_SIMD: scalar
        run: cargo test -p greppy-embed-native --lib cpu_simd_override_selects_requested_supported_kernel

      # clippy is pinned to 1.95.0 (rust-toolchain.toml). The lints allowed below
      # are style/complexity lints (no bug/correctness lints) that clippy 1.95
      # newly flags on pre-existing, correct code. We hard-gate on rustc warnings
      # (dead_code, unused, …) and clippy correctness/suspicious/perf, and treat
      # this specific batch as advisory. Tracked for a follow-up cleanup pass.
      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: >
          cargo clippy --workspace --all-targets --features greppy/ci-test-assets -- -D warnings
          -A clippy::unnecessary_lazy_evaluations
          -A clippy::too_many_arguments
          -A clippy::needless_range_loop
          -A clippy::manual_pattern_char_comparison
          -A clippy::manual_is_multiple_of
          -A clippy::len_zero
          -A clippy::bool_assert_comparison
          -A clippy::skip_while_next
          -A clippy::needless_return
          -A clippy::single_char_add_str
          -A clippy::assertions_on_constants
          -A clippy::useless_vec
          -A clippy::infallible_destructuring_match

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: agent benchmark precision grader
        run: python3 -m unittest bench/agent_efficiency/test_grade_answers.py

      - name: paired coding benchmark harness
        run: python3 -m unittest discover -s bench/agent_coding -p 'test_*.py' -v

      - name: model redistribution verifier tests
        run: python3 -m unittest tools/test_verify_model_redistribution.py

      - name: Qwen training provenance package
        run: |
          python3 -m unittest discover -s training/qwen35/tests -v
          python3 training/qwen35/verify_package.py

      # Black-box battle suite against the freshly built debug binaries. The
      # real-assets-link and the release workflow separately build the actual
      # embedded payload, avoiding repeated 827 MB process images here.
      - name: battle suite (bench/battle/run_battle.sh)
        env:
          # Point the harness at the debug binaries we just built.
          GREPPY_BIN: ${{ github.workspace }}/target/debug/greppy
        run: bash bench/battle/run_battle.sh

  # Link the actual 827 MB embedded payload on every Tier-1 object format.
  # This is deliberately separate from fast tests: release/default builds
  # never use sentinels, and a real link catches missing LFS assets plus
  # PE/COFF, Mach-O, or ELF size/link regressions.
  real-assets-link:
    name: real embedded assets (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout with Git LFS models
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify model redistribution integrity
        run: python tools/verify_model_redistribution.py

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build default product binary with real assets
        run: cargo build -p greppy --bin greppy

      - name: Apple Silicon Metal inference gates
        if: runner.os == 'macOS'
        env:
          EMBED_NATIVE_GGUF: ${{ github.workspace }}/crates/cli/assets/embeddinggemma-300m-q4k/embeddinggemma-300M-Q4_K.gguf
        run: |
          cargo test -p greppy-embed-native --features metal --lib -- --test-threads=1
          cargo test -p greppy-embed-native --features metal --test metal_kernel_parity
          cargo test -p greppy-embed-native --features metal --test metal_forward_parity

  windows-cpu:
    name: Windows CPU + named-pipe daemons
    runs-on: windows-latest
    env:
      GIT_LFS_SKIP_SMUDGE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo registry, git, and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: windows-cpu-fast-assets-v1-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: windows-cpu-fast-assets-v1-

      - name: Build Windows CPU test binary
        run: cargo build --workspace --features greppy/ci-test-assets

      - name: Test Windows locks and daemon transport
        run: cargo test -p greppy-core -p greppy-embed-native -p greppy --lib --features greppy/ci-test-assets -- --test-threads=1

      - name: Verify doctor registry
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "$env:RUNNER_TEMP/greppy-doctor-root","$env:RUNNER_TEMP/greppy-doctor-store" | Out-Null
          $env:GREPPY_STORE_DIR = "$env:RUNNER_TEMP/greppy-doctor-store"
          $output = & target/debug/greppy.exe --device cpu doctor --json --root "$env:RUNNER_TEMP/greppy-doctor-root"
          $doctorExit = $LASTEXITCODE
          $output | Out-File -Encoding utf8 doctor.json
          if ($doctorExit -ne 0 -and $doctorExit -ne 1) {
            Write-Error "Windows doctor failed with unexpected exit code $doctorExit"
            exit 1
          }
          $doctor = Get-Content doctor.json -Raw | ConvertFrom-Json
          if ($doctor.inference.registry.selected_backend -ne 'cpu') {
            Write-Error 'Windows CPU registry selection failed'
            exit 1
          }
          if (-not $doctor.inference.daemons.embedding.state -or -not $doctor.inference.daemons.summary.state) {
            Write-Error 'Windows daemon diagnostics are incomplete'
            exit 1
          }
          exit 0

  # Heavier validation runs nightly and on explicit dispatch. Release package
  # validation belongs to release.yml and is not duplicated here.
  soak:
    name: nightly soak (${{ matrix.os }})
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry, git, and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-soak-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-soak-
            ${{ runner.os }}-cargo-

      - name: Install sqlite3 (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Build debug binaries
        run: cargo build --bins

      - name: battle suite + soak
        env:
          GREPPY_BIN: ${{ github.workspace }}/target/debug/greppy
          BATTLE_SOAK: "1"
          BATTLE_SOAK_ITERS: "100"
          BATTLE_SOAK_FILES: "40"
        run: bash bench/battle/run_battle.sh
