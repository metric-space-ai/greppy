name: Rust dependency security audit

on:
  push:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - Cargo.lock
      - .github/workflows/security-audit.yml
  pull_request:
    paths:
      - '**/Cargo.toml'
      - Cargo.lock
      - .github/workflows/security-audit.yml
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  issues: write

jobs:
  rustsec:
    name: RustSec advisory database
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # rustsec/audit-check v2.0.0, pinned to immutable source.
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
