name: Rust dependency security audit

on:
  push:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - Cargo.lock
      - .github/workflows/security-audit.yml
  pull_request:
    paths:
      - '**/Cargo.toml'
      - Cargo.lock
      - .github/workflows/security-audit.yml
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  issues: write

jobs:
  rustsec:
    name: RustSec advisory database
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # Install cargo-audit with --locked so it uses its own published
      # Cargo.lock. Installing the unlocked "latest" resolves the transitive
      # dep kstring to 2.0.4, whose MSRV (Rust 1.96) exceeds the toolchain and
      # fails to compile cargo-audit itself (not a project advisory).
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      # Informational maintenance advisory only. The locked `paste` crate is a
      # transitive compile-time proc macro, not runtime code. The bounded
      # exception and removal condition are in SECURITY.md.
      - name: Run cargo audit
        run: cargo audit --ignore RUSTSEC-2024-0436
