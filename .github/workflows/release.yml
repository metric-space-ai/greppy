name: release

# Build ready-to-run binaries for macOS Apple Silicon, Linux x86_64, and
# Windows x86_64, sign them, and attach them to a GitHub Release.
#
# Triggers:
#   * push a tag `v*`   -> builds and publishes a Release with the assets
#   * manual dispatch   -> builds the assets and uploads them as workflow
#                          artifacts (no Release is created)
#
# Each job builds NATIVELY on its own runner (no cross-compilation), so the
# bundled C deps (tree-sitter grammars, SQLite) and the native embedded
# inference engines compile with the platform's own toolchain. The Rust
# version is the one pinned by rust-toolchain.toml.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      sign_dry_run:
        description: >-
          RC signing dry-run: run the Apple/Windows signing, notarization and
          verification steps on the built artifacts WITHOUT a tag and WITHOUT
          publishing. Lets the first real signing test happen before the
          immutable release tag exists. Requires the signing secrets.
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  release-eligibility:
    name: immutable release subject
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Test release artifact contract and verifiers
        run: python3 -m unittest tools.test_release_artifacts -v
      - name: Require green CI, CodeQL, security-audit and task-bank for this commit
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The publish job already binds summary/agent/coding benchmark evidence
          # to this SHA; require the remaining mechanical gates on the exact
          # release subject as well - a tag must never outrun its checks.
          for wf in ci.yml codeql.yml security-audit.yml task-bank-audit.yml; do
            ok="$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --limit 100 \
              --workflow "$wf" \
              --commit "$GITHUB_SHA" \
              --status completed \
              --json conclusion \
              --jq '[.[] | select(.conclusion == "success")] | length')"
            if [ "${ok:-0}" -lt 1 ]; then
              echo "::error::no successful $wf run exists for $GITHUB_SHA - all gates must be green on the exact release subject"
              exit 1
            fi
            echo "$wf: green for $GITHUB_SHA"
          done
      - name: Reject reused or replaced release subjects
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          EVENT_CREATED: ${{ github.event.created }}
          EVENT_DELETED: ${{ github.event.deleted }}
          EVENT_FORCED: ${{ github.event.forced }}
          GH_TOKEN: ${{ github.token }}
        run: |
          test "$EVENT_CREATED" = true || {
            echo '::error::release workflow requires a newly created tag event'
            exit 1
          }
          test "$EVENT_DELETED" != true && test "$EVENT_FORCED" != true || {
            echo '::error::deleted or force-updated release tags are not eligible'
            exit 1
          }
          tag_commit="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          test "$tag_commit" = "$GITHUB_SHA" || {
            echo "::error::tag resolves to $tag_commit instead of $GITHUB_SHA"
            exit 1
          }
          response="$RUNNER_TEMP/existing-release.json"
          status="$(curl --silent --show-error --location \
            --output "$response" --write-out '%{http_code}' \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME")"
          case "$status" in
            404) ;;
            200)
              echo "::error::a release already exists for $GITHUB_REF_NAME; releases are immutable"
              cat "$response"
              exit 1
              ;;
            *)
              echo "::error::cannot establish release immutability (GitHub API HTTP $status)"
              cat "$response"
              exit 1
              ;;
          esac

  model-redistribution:
    name: model redistribution provenance
    needs: release-eligibility
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Restore model assets
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            crates/cli/assets/qwen35-0.8b-mtp-q4km/Qwen3.5-0.8B-MTP-Q4_K_M.gguf
            crates/cli/assets/qwen35-0.8b-mtp-q4km/tokenizer.json
            crates/cli/assets/embeddinggemma-300m-q4k/embeddinggemma-300M-Q4_K.gguf
            crates/cli/assets/embeddinggemma-300m-q4k/tokenizer.json
          key: model-assets-${{ hashFiles('crates/cli/assets/MODEL_ASSETS.json') }}

      - name: Fetch model assets (release-hosted, sha-pinned)
        shell: bash
        run: ./tools/fetch_model_assets.sh


      - name: Verify model provenance and release readiness
        shell: bash
        run: |
          mode=()
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            mode+=(--release)
          fi
          python3 tools/verify_model_redistribution.py \
            "${mode[@]}" \
            --git-commit "$GITHUB_SHA" \
            --report model-redistribution-report.json

      - name: Create deterministic Qwen training-evidence archive
        shell: bash
        run: |
          python3 tools/release_artifacts.py create-training-archive \
            --root . \
            --manifest training/qwen35/MANIFEST.sha256 \
            --output greppy-qwen35-training-evidence.tar.gz
          shasum -a 256 greppy-qwen35-training-evidence.tar.gz \
            > greppy-qwen35-training-evidence.tar.gz.sha256

      - name: Upload digest-bound provenance report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: model-redistribution-${{ github.sha }}
          path: |
            model-redistribution-report.json
            greppy-qwen35-training-evidence.tar.gz
            greppy-qwen35-training-evidence.tar.gz.sha256
          if-no-files-found: error

      - name: Attest model provenance report
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999
        with:
          subject-path: model-redistribution-report.json

      - name: Attest Qwen training evidence
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999
        with:
          subject-path: greppy-qwen35-training-evidence.tar.gz

  build:
    name: build (${{ matrix.name }})
    needs: model-redistribution
    runs-on: ${{ matrix.os }}
    timeout-minutes: 360
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # GPU-accelerated where the platform supports it; the binary always
          # runs on CPU when no GPU is present (Metal detected at runtime, CUDA
          # dynamically loaded — no hard cudart link, so it starts without CUDA).
          - name: macos-arm64
            os: macos-latest
            asset: greppy-macos-arm64.tar.gz
            features: metal
            footprint_devices: 'cpu metal'
            runner_os: macOS
            runner_arch: ARM64
            rust_host: aarch64-apple-darwin
          # Pinned to 22.04: ubuntu-latest (24.04) links glibc 2.39, which
          # excludes every 22.04-LTS host (v0.1.0/v0.1.1 assets shipped with
          # that requirement — a real-world "GLIBC_2.39 not found" failure).
          # 22.04 builds run on anything with glibc >= 2.35.
          - name: linux-x86_64
            os: ubuntu-22.04
            asset: greppy-linux-x86_64.tar.gz
            features: cuda
            footprint_devices: 'cpu'
            runner_os: Linux
            runner_arch: X64
            rust_host: x86_64-unknown-linux-gnu
            cuda_sub_packages: '["nvcc", "cudart"]'
            cuda_non_cuda_sub_packages: '["libcublas", "libcublas-dev"]'
          # v0.2.0 certifies Windows CPU inference and named-pipe daemons.
          # Windows CUDA and macOS Intel remain outside this release gate.
          - name: windows-x86_64
            os: windows-latest
            asset: greppy-windows-x86_64.zip
            features: cpu
            footprint_devices: 'cpu'
            runner_os: Windows
            runner_arch: X64
            rust_host: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Restore model assets
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            crates/cli/assets/qwen35-0.8b-mtp-q4km/Qwen3.5-0.8B-MTP-Q4_K_M.gguf
            crates/cli/assets/qwen35-0.8b-mtp-q4km/tokenizer.json
            crates/cli/assets/embeddinggemma-300m-q4k/embeddinggemma-300M-Q4_K.gguf
            crates/cli/assets/embeddinggemma-300m-q4k/tokenizer.json
          key: model-assets-${{ hashFiles('crates/cli/assets/MODEL_ASSETS.json') }}

      - name: Fetch model assets (release-hosted, sha-pinned)
        shell: bash
        run: ./tools/fetch_model_assets.sh

      - name: Verify bundled inference assets
        shell: bash
        run: |
          ./tools/fetch_model_assets.sh
          ls -lh crates/cli/assets/embeddinggemma-300m-q4k
          ls -lh crates/cli/assets/qwen35-0.8b-mtp-q4km
          python tools/verify_model_redistribution.py

      - name: Install Rust (pinned by rust-toolchain.toml)
        # dtolnay/rust-toolchain v1, pinned to an immutable source revision.
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: '1.95.0'

      - name: Assert and record native build host
        shell: bash
        run: |
          python tools/release_artifacts.py record-build-environment \
            --output "build-environment-${{ matrix.name }}.json" \
            --expected-os "${{ matrix.runner_os }}" \
            --expected-arch "${{ matrix.runner_arch }}" \
            --expected-host "${{ matrix.rust_host }}" \
            --matrix-name "${{ matrix.name }}" \
            --features "${{ matrix.features }}" \
            --git-commit "$GITHUB_SHA" \
            --cargo-lock Cargo.lock

      # CUDA toolkit (nvcc + cuBLAS headers/import libs) so build.rs can
      # compile the vendored ggml-cuda kernels into the shared backend. No GPU
      # is needed at build time.
      - name: Install CUDA toolkit
        if: matrix.features == 'cuda'
        uses: Jimver/cuda-toolkit@4bd727d5619dc6fa323b1e76c3aa5dca94f5ec6d
        with:
          cuda: '12.5.0'
          method: network
          sub-packages: ${{ matrix.cuda_sub_packages }}
          non-cuda-sub-packages: ${{ matrix.cuda_non_cuda_sub_packages }}

      - name: Add MSVC developer tools to PATH
        if: runner.os == 'Windows' && matrix.features == 'cuda'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756

      - name: Build release binary
        run: cargo build --locked --release --bin greppy ${{ matrix.features != 'cpu' && format('--features {0}', matrix.features) || '' }}

      - name: Sign macOS binary with Developer ID
        if: (startsWith(github.ref, 'refs/tags/') || inputs.sign_dry_run) && runner.os == 'macOS'
        shell: bash
        env:
          CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          test -n "$CERTIFICATE_P12" && test -n "$CERTIFICATE_PASSWORD" && test -n "$SIGNING_IDENTITY"
          keychain="$RUNNER_TEMP/greppy-signing.keychain-db"
          cert="$RUNNER_TEMP/greppy-signing.p12"
          printf '%s' "$CERTIFICATE_P12" | base64 -D > "$cert"
          security create-keychain -p "$CERTIFICATE_PASSWORD" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$CERTIFICATE_PASSWORD" "$keychain"
          security import "$cert" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain"
          security list-keychains -d user -s "$keychain" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "$CERTIFICATE_PASSWORD" "$keychain"
          codesign --force --options runtime --timestamp --sign "$SIGNING_IDENTITY" target/release/greppy
          codesign --verify --strict --verbose=2 target/release/greppy

      - name: Sign Windows binary with Authenticode
        if: (startsWith(github.ref, 'refs/tags/') || inputs.sign_dry_run) && runner.os == 'Windows'
        shell: pwsh
        env:
          CERTIFICATE_PFX: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:CERTIFICATE_PFX -or -not $env:CERTIFICATE_PASSWORD) {
            # Owner decision 2026-07-13 (WINDOWS_SIGNING_MODE=MICROSOFT_STORE_MSIX):
            # Windows ships via the Microsoft Store, where Microsoft signs the
            # MSIX submission - the PFX secrets stay empty BY DESIGN. The
            # direct-download binary is intentionally unsigned; release notes
            # must point Windows users to the Store for a signed install.
            Write-Host '::warning title=Windows direct-download binary is unsigned by design::Windows signing happens via Microsoft Store MSIX submission; the PFX path is intentionally disabled.'
            exit 0
          }
          $cert = Join-Path $env:RUNNER_TEMP 'greppy-signing.pfx'
          [IO.File]::WriteAllBytes($cert, [Convert]::FromBase64String($env:CERTIFICATE_PFX))
          & signtool sign /fd SHA256 /tr 'http://timestamp.digicert.com' /td SHA256 /f $cert /p $env:CERTIFICATE_PASSWORD target/release/greppy.exe
          if ($LASTEXITCODE -ne 0) { throw 'signtool sign failed' }
          & signtool verify /pa /all /v target/release/greppy.exe
          if ($LASTEXITCODE -ne 0) { throw 'signtool verify failed' }

      - name: Verify CUDA backend runtime dependencies
        if: matrix.features == 'cuda'
        shell: bash
        run: |
          backend="$(find target/release/build -path '*/out/greppy_embed_native_cuda.so' -print -quit)"
          test -n "$backend" && test -f "$backend"
          readelf -d "$backend"
          ! readelf -d "$backend" | grep -E 'RPATH|RUNPATH'
          needed="$(readelf -d "$backend" | sed -n 's/.*Shared library: \[\(.*\)\]/\1/p')"
          bad="$(printf '%s\n' "$needed" | grep -Ev '^(libcuda\.so\.1|libc\.so\.6|libm\.so\.6|libpthread\.so\.0|librt\.so\.1|libdl\.so\.2|libgcc_s\.so\.1|libstdc\+\+\.so\.6|ld-linux-x86-64\.so\.2)$' || true)"
          test -z "$bad" || { echo "::error::unexpected CUDA backend dependencies: $bad"; exit 1; }
          ! printf '%s\n' "$needed" | grep -E 'cudart|cublas|nvrtc'

      # Tag builds must ship a binary whose --version matches the tag —
      # v0.1.1 shipped reporting "grep 0.1.0" because the workspace version
      # was never bumped. Fails the release before any asset is published.
      - name: Assert --version matches the tag (Unix)
        if: startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows'
        run: |
          want="${GITHUB_REF_NAME#v}"
          got="$(target/release/greppy --version | awk '{print $NF}')"
          echo "tag=$want binary=$got"
          [ "$want" = "$got" ] || { echo "::error::version mismatch"; exit 1; }

      - name: Assert --version matches the tag (Windows)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'
        shell: pwsh
        run: |
          $want = $env:GITHUB_REF_NAME -replace '^v',''
          $got = (& target/release/greppy.exe --version).Split(' ')[-1]
          Write-Host "tag=$want binary=$got"
          if ($want -ne $got) { Write-Error "version mismatch"; exit 1 }

      - name: Notarize and staple macOS signed binary
        if: (startsWith(github.ref, 'refs/tags/') || inputs.sign_dry_run) && runner.os == 'macOS'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          test -n "$APPLE_ID" && test -n "$APPLE_TEAM_ID" && test -n "$APPLE_APP_PASSWORD"
          notary_zip="$RUNNER_TEMP/greppy-notary.zip"
          ditto -c -k --keepParent target/release/greppy "$notary_zip"
          submit_log="$RUNNER_TEMP/notarytool-submit.log"
          xcrun notarytool submit "$notary_zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait | tee "$submit_log"
          grep -q 'status: Accepted' "$submit_log" || {
            echo '::error::notarization was not Accepted'
            exit 1
          }
          # A bare Mach-O binary cannot carry a stapled ticket (stapler exits 73
          # on standalone executables - only bundles/dmg/pkg can be stapled;
          # proven by the first signing dry-run). CLI standard practice applies:
          # the notarization ticket is served online, which Gatekeeper checks.
          # spctl --assess --type execute is equally app-bundle-only: it exits 3
          # ("valid but does not seem to be an app") for every bare executable
          # (proven by the second dry-run), so strict signature verification is
          # the correct final gate for a CLI.
          codesign --verify --strict --verbose=2 target/release/greppy

      - name: Measure runtime footprint (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          repo="$RUNNER_TEMP/greppy-footprint-serde"
          git clone --quiet --filter=blob:none https://github.com/serde-rs/serde.git "$repo"
          git -C "$repo" checkout --quiet --detach 1023d077510b4aef36a41ef56fdb7798568a2654
          for device in ${{ matrix.footprint_devices }}; do
            timeout_args=()
            if [ "$device" = cpu ]; then
              # 3600 was too tight: the serde embedding build on the 4-core
              # hosted runner needs >1h on the pure-CPU path (dry-run #4 hit
              # the cap). This is a measurement, not a quality gate - the
              # numbers land in the release evidence either way.
              timeout_args=(--timeout-seconds 7200)
            fi
            python3 bench/runtime_footprint.py \
              --greppy "$PWD/target/release/greppy" \
              --repo "$repo" \
              --semantic-query 'apply a rename case rule to a struct field' \
              --brief-symbol apply_to_field \
              --device "$device" \
              "${timeout_args[@]}" \
              --warm-repeats 3 \
              --output "runtime-footprint-${{ matrix.name }}-$device.json"
          done

      - name: Measure runtime footprint (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $repo = Join-Path $env:RUNNER_TEMP 'greppy-footprint-serde'
          git clone --quiet --filter=blob:none https://github.com/serde-rs/serde.git $repo
          git -C $repo checkout --quiet --detach 1023d077510b4aef36a41ef56fdb7798568a2654
          foreach ($device in '${{ matrix.footprint_devices }}'.Split(' ')) {
            python bench/runtime_footprint.py `
              --greppy "$PWD/target/release/greppy.exe" `
              --repo $repo `
              --semantic-query 'apply a rename case rule to a struct field' `
              --brief-symbol apply_to_field `
              --device $device `
              --timeout-seconds 7200 `
              --warm-repeats 3 `
              --output "runtime-footprint-${{ matrix.name }}-$device.json"
            if ($LASTEXITCODE -ne 0) { throw "runtime footprint failed for $device" }
          }

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/release/greppy dist/greppy
          cp bench/release_package_smoke.sh dist/
          cp bench/release_daemon_stress.sh dist/
          cp tools/release_artifacts.py dist/
          cp README.md LICENSE THIRD_PARTY.md SECURITY.md SUPPORT.md CHANGELOG.md Cargo.lock dist/
          cp -R licenses dist/licenses
          tar -C dist -czf "${{ matrix.asset }}" .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/greppy.exe dist/greppy.exe
          Copy-Item bench/release_package_smoke.ps1 dist/release_package_smoke.ps1
          Copy-Item tools/release_artifacts.py dist/release_artifacts.py
          Copy-Item README.md,LICENSE,THIRD_PARTY.md,SECURITY.md,SUPPORT.md,CHANGELOG.md,Cargo.lock dist/
          Copy-Item licenses dist/licenses -Recurse
          Compress-Archive -Path dist/* -DestinationPath "${{ matrix.asset }}" -Force

      - name: Smoke-test packaged artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          clean="$RUNNER_TEMP/greppy-package-smoke"
          mkdir -p "$clean/bin" "$clean/store" "$clean/repo"
          tar -C "$clean/bin" -xzf "${{ matrix.asset }}"
          test ! -e "$clean/bin/grep"
          test -s "$clean/bin/licenses/EMBEDDED-MODEL-TERMS.md"
          test -s "$clean/bin/licenses/EMBEDDINGGEMMA-NOTICE.txt"
          test -s "$clean/bin/licenses/GEMMA-TERMS.html"
          test -s "$clean/bin/licenses/EMBEDDINGGEMMA-MODIFICATIONS.txt"
          test -s "$clean/bin/licenses/EMBEDDINGGEMMA-PROVENANCE.json"
          test -s "$clean/bin/licenses/QWEN3.5-APACHE-2.0.txt"
          test -s "$clean/bin/licenses/QWEN3.5-MODIFICATIONS.txt"
          test -s "$clean/bin/licenses/QWEN3.5-PROVENANCE.json"
          test -s "$clean/bin/licenses/QWEN3.5-TRAINING-DATA-MANIFEST.json"
          test -s "$clean/bin/licenses/MODEL-REDISTRIBUTION.lock.json"
          bash "$clean/bin/release_package_smoke.sh" "$clean/bin/greppy" "$clean/work"

      - name: Smoke-test packaged artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $clean = Join-Path $env:RUNNER_TEMP 'greppy-package-smoke'
          New-Item -ItemType Directory -Force "$clean/bin","$clean/store","$clean/repo" | Out-Null
          Expand-Archive -Path "${{ matrix.asset }}" -DestinationPath "$clean/bin" -Force
          if (-not (Test-Path "$clean/bin/licenses/EMBEDDED-MODEL-TERMS.md")) { throw 'missing embedded model terms' }
          if (-not (Test-Path "$clean/bin/licenses/EMBEDDINGGEMMA-NOTICE.txt")) { throw 'missing EmbeddingGemma notice' }
          if (-not (Test-Path "$clean/bin/licenses/GEMMA-TERMS.html")) { throw 'missing Gemma terms' }
          if (-not (Test-Path "$clean/bin/licenses/EMBEDDINGGEMMA-MODIFICATIONS.txt")) { throw 'missing EmbeddingGemma modification notice' }
          if (-not (Test-Path "$clean/bin/licenses/EMBEDDINGGEMMA-PROVENANCE.json")) { throw 'missing EmbeddingGemma provenance' }
          if (-not (Test-Path "$clean/bin/licenses/QWEN3.5-APACHE-2.0.txt")) { throw 'missing Qwen license' }
          if (-not (Test-Path "$clean/bin/licenses/QWEN3.5-MODIFICATIONS.txt")) { throw 'missing Qwen modification notice' }
          if (-not (Test-Path "$clean/bin/licenses/QWEN3.5-PROVENANCE.json")) { throw 'missing Qwen provenance' }
          if (-not (Test-Path "$clean/bin/licenses/QWEN3.5-TRAINING-DATA-MANIFEST.json")) { throw 'missing Qwen training-data manifest' }
          if (-not (Test-Path "$clean/bin/licenses/MODEL-REDISTRIBUTION.lock.json")) { throw 'missing model redistribution lock' }
          & "$clean/bin/release_package_smoke.ps1" -Binary "$clean/bin/greppy.exe" -Work "$clean/work"

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: dist
          format: spdx-json
          output-file: ${{ matrix.asset }}.spdx.json
          upload-artifact: false

      - name: Bind and verify release contents in SPDX SBOM
        shell: bash
        run: |
          python tools/release_artifacts.py augment-spdx \
            --sbom "${{ matrix.asset }}.spdx.json" \
            --dist dist \
            --cargo-lock Cargo.lock \
            --target "${{ matrix.rust_host }}"
          python tools/release_artifacts.py verify-spdx \
            --sbom "${{ matrix.asset }}.spdx.json" \
            --dist dist \
            --cargo-lock Cargo.lock \
            --target "${{ matrix.rust_host }}"

      - name: Generate SHA256 checksum (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"

      - name: Generate SHA256 checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 "${{ matrix.asset }}").Hash.ToLowerInvariant()
          "$hash  ${{ matrix.asset }}" | Set-Content -Encoding ascii "${{ matrix.asset }}.sha256"

      - name: Attest release package provenance
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999
        with:
          subject-path: ${{ matrix.asset }}

      - name: Attest SBOM provenance
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999
        with:
          subject-path: ${{ matrix.asset }}.spdx.json

      - name: Attest runtime footprint evidence
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999
        with:
          subject-path: runtime-footprint-*.json

      - name: Attest native build environment
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999
        with:
          subject-path: build-environment-${{ matrix.name }}.json

      - name: Upload packaged artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256
            ${{ matrix.asset }}.spdx.json
            runtime-footprint-*.json
            build-environment-${{ matrix.name }}.json

  verify-packages:
    name: clean package (${{ matrix.name }})
    needs: build
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-latest
            asset: greppy-macos-arm64.tar.gz
            rust_host: aarch64-apple-darwin
          - name: linux-x86_64-no-toolkit
            os: ubuntu-22.04
            asset: greppy-linux-x86_64.tar.gz
            rust_host: x86_64-unknown-linux-gnu
          - name: windows-x86_64
            os: windows-latest
            asset: greppy-windows-x86_64.zip
            rust_host: x86_64-pc-windows-msvc
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ${{ matrix.asset }}
          path: package

      - name: Verify clean Unix host
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p unpack store repo
          (cd package && shasum -a 256 -c "${{ matrix.asset }}.sha256")
          tar -C unpack -xzf "package/${{ matrix.asset }}"
          test ! -e unpack/grep
          if [[ "$GITHUB_REF" == refs/tags/* && "${{ runner.os }}" = macOS ]]; then
            codesign --verify --strict --verbose=2 unpack/greppy
            xcrun stapler validate unpack/greppy
            spctl --assess --type execute --verbose=4 unpack/greppy
          fi
          bash unpack/release_package_smoke.sh "$PWD/unpack/greppy" "$PWD/smoke"
          bash unpack/release_daemon_stress.sh "$PWD/unpack/greppy" "$PWD/daemon-stress"
          if [ "${{ runner.os }}" = Linux ]; then
            ! ldd unpack/greppy | grep -E 'cudart|cublas|nvrtc'
            test -s package/runtime-footprint-linux-x86_64-cpu.json
          else
            test -s package/runtime-footprint-macos-arm64-cpu.json
            test -s package/runtime-footprint-macos-arm64-metal.json
          fi
          python3 unpack/release_artifacts.py verify-spdx \
            --sbom "package/${{ matrix.asset }}.spdx.json" \
            --dist unpack \
            --cargo-lock unpack/Cargo.lock \
            --target "${{ matrix.rust_host }}"

      - name: Verify clean Windows host
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          HAVE_WINDOWS_CERT_SECRETS: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 != '' && '1' || '' }}
        run: |
          New-Item -ItemType Directory -Force unpack,store,repo | Out-Null
          $line = (Get-Content "package/${{ matrix.asset }}.sha256" -Raw).Trim()
          $want = ($line -split '\s+')[0]
          $got = (Get-FileHash -Algorithm SHA256 "package/${{ matrix.asset }}").Hash.ToLowerInvariant()
          if ($want -ne $got) { throw "package checksum mismatch: $got != $want" }
          Expand-Archive -Path "package/${{ matrix.asset }}" -DestinationPath unpack -Force
          if (-not (Test-Path "package/${{ matrix.asset }}.spdx.json")) { throw 'missing SPDX SBOM' }
          if ($env:GITHUB_REF -like 'refs/tags/*') {
            if (-not $env:HAVE_WINDOWS_CERT_SECRETS) {
              # Consistent with the signing step: Windows signing happens via
              # the Microsoft Store MSIX channel; the direct-download binary is
              # unsigned by design.
              Write-Host '::warning title=Windows direct-download binary is unsigned by design::Authenticode verification skipped - signing happens via Microsoft Store MSIX.'
            } else {
              $signature = Get-AuthenticodeSignature "$PWD/unpack/greppy.exe"
              if ($signature.Status -ne 'Valid') { throw "invalid Authenticode signature: $($signature.Status)" }
            }
          }
          if (-not (Test-Path 'package/runtime-footprint-windows-x86_64-cpu.json')) { throw 'missing runtime footprint evidence' }
          python unpack/release_artifacts.py verify-spdx `
            --sbom "package/${{ matrix.asset }}.spdx.json" `
            --dist unpack `
            --cargo-lock unpack/Cargo.lock `
            --target "${{ matrix.rust_host }}"
          if ($LASTEXITCODE -ne 0) { throw 'SPDX verification failed' }
          & unpack/release_package_smoke.ps1 -Binary "$PWD/unpack/greppy.exe" -Work "$PWD/smoke"
          # TODO(windows daemon stress): port bench/release_daemon_stress.sh
          # to PowerShell for this leg. Portable as-is: concurrency/queue
          # limits/oversize/slow-client/protocol scenarios (the raw client
          # needs System.IO.Pipes.NamedPipeClientStream against the
          # \\.\pipe\greppy-* endpoints instead of unix sockets), kill -9
          # (Stop-Process -Force) + respawn, and TTL-based eviction/exit.
          # Genuinely NOT portable: the two stale-endpoint-file scenarios
          # (leftover socket file after SIGKILL; junk regular file at the
          # endpoint path) - named pipes vanish with their owning process,
          # so no stale filesystem endpoint can exist on Windows.

  publish:
    name: publish gated release
    needs: [model-redistribution, build, verify-packages]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    environment: production-release
    permissions:
      contents: write
      actions: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: release-assets
      - name: Verify release provenance approval subject
        shell: bash
        run: |
          report="release-assets/model-redistribution-$GITHUB_SHA/model-redistribution-report.json"
          test -s "$report"
          test "$(jq -r .schema_version "$report")" = greppy.model-redistribution-report.v1
          test "$(jq -r .mode "$report")" = release
          test "$(jq -r .passed "$report")" = true
          test "$(jq -r .git_commit "$report")" = "$GITHUB_SHA"
          test "$(jq -r .lock_sha256 "$report")" = \
            "$(sha256sum licenses/MODEL-REDISTRIBUTION.lock.json | cut -d' ' -f1)"
          evidence_dir="release-assets/model-redistribution-$GITHUB_SHA"
          (cd "$evidence_dir" && \
            shasum -a 256 -c greppy-qwen35-training-evidence.tar.gz.sha256)
          python3 tools/release_artifacts.py create-training-archive \
            --root . \
            --manifest training/qwen35/MANIFEST.sha256 \
            --output "$RUNNER_TEMP/qwen-evidence-reproduction.tar.gz"
          test "$(sha256sum "$evidence_dir/greppy-qwen35-training-evidence.tar.gz" | cut -d' ' -f1)" = \
            "$(sha256sum "$RUNNER_TEMP/qwen-evidence-reproduction.tar.gz" | cut -d' ' -f1)"
      - name: Download passing benchmark for this exact commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id="$(gh run list \
            --workflow agent-benchmark.yml \
            --commit "$GITHUB_SHA" \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // empty')"
          test -n "$run_id" || {
            echo '::error::no successful agent benchmark exists for this release commit'
            exit 1
          }
          mkdir -p release-assets/agent-benchmark
          gh run download "$run_id" \
            --name "greppy-agent-benchmark-$GITHUB_SHA" \
            --dir release-assets/agent-benchmark
          (cd release-assets/agent-benchmark && shasum -a 256 -c greppy-agent-benchmark.tar.gz.sha256)
          mkdir -p release-assets/agent-benchmark/verified
          tar -C release-assets/agent-benchmark/verified \
            -xzf release-assets/agent-benchmark/greppy-agent-benchmark.tar.gz
          test "$(jq -r .passed release-assets/agent-benchmark/verified/release-gate.json)" = true
          test "$(jq -r .greppy.git_commit release-assets/agent-benchmark/verified/RUN_MANIFEST.json)" = "$GITHUB_SHA"
          test "$(jq -r .raw_traces_published release-assets/agent-benchmark/verified/RUN_MANIFEST.json)" = false
      - name: Download passing coding benchmark for this exact commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id="$(gh run list \
            --workflow coding-benchmark.yml \
            --commit "$GITHUB_SHA" \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // empty')"
          test -n "$run_id" || {
            echo '::error::no successful coding outcome benchmark exists for this release commit'
            exit 1
          }
          mkdir -p release-assets/coding-benchmark
          gh run download "$run_id" \
            --name "greppy-coding-benchmark-$GITHUB_SHA" \
            --dir release-assets/coding-benchmark
          (cd release-assets/coding-benchmark && shasum -a 256 -c greppy-coding-benchmark.tar.gz.sha256)
          mkdir -p release-assets/coding-benchmark/verified
          tar -C release-assets/coding-benchmark/verified \
            -xzf release-assets/coding-benchmark/greppy-coding-benchmark.tar.gz
          test "$(jq -r .gate.passed release-assets/coding-benchmark/verified/MANIFEST.json)" = true
          test "$(jq -r .greppy_source.git_commit release-assets/coding-benchmark/verified/MANIFEST.json)" = "$GITHUB_SHA"
          test "$(jq -r .greppy_source.tracked_worktree_dirty release-assets/coding-benchmark/verified/MANIFEST.json)" = false
      - name: Download passing summary-quality gate for this exact commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id="$(gh run list \
            --workflow summary-quality.yml \
            --commit "$GITHUB_SHA" \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // empty')"
          test -n "$run_id" || {
            echo '::error::no successful summary-quality gate exists for this release commit'
            exit 1
          }
          mkdir -p release-assets/summary-quality
          gh run download "$run_id" \
            --name "greppy-summary-quality-$GITHUB_SHA" \
            --dir release-assets/summary-quality
          (cd release-assets/summary-quality && shasum -a 256 -c greppy-summary-quality.tar.gz.sha256)
          mkdir -p release-assets/summary-quality/verified
          tar -C release-assets/summary-quality/verified \
            -xzf release-assets/summary-quality/greppy-summary-quality.tar.gz
          manifest=release-assets/summary-quality/verified/MANIFEST.json
          results=release-assets/summary-quality/verified/results.json
          judgments=release-assets/summary-quality/verified/judgments.json
          gate=release-assets/summary-quality/verified/gate.json
          test "$(jq -r .schema_version "$manifest")" = greppy.summary-quality-evidence.v1
          test "$(jq -r .git_commit "$manifest")" = "$GITHUB_SHA"
          test "$(jq -r .raw_traces_published "$manifest")" = false
          test "$(jq -r .gate.passed "$manifest")" = true
          test "$(jq -r .passed "$gate")" = true
          test "$(jq -r .cases_sha256 "$manifest")" = \
            "$(sha256sum bench/summary_quality/cases_v1.json | cut -d' ' -f1)"
          test "$(jq -r .results_sha256 "$manifest")" = \
            "$(sha256sum "$results" | cut -d' ' -f1)"
          test "$(jq -r .judgments_sha256 "$manifest")" = \
            "$(sha256sum "$judgments" | cut -d' ' -f1)"
          test "$(jq -r .gate_sha256 "$manifest")" = \
            "$(sha256sum "$gate" | cut -d' ' -f1)"
      - name: Stage and verify exact release asset contract
        shell: bash
        run: |
          python3 tools/release_artifacts.py stage-release \
            --source release-assets \
            --output release-publish \
            --contract tools/release_asset_contract.v1.json \
            --git-commit "$GITHUB_SHA" \
            --tag "$GITHUB_REF_NAME" \
            --cargo-lock Cargo.lock
          python3 tools/release_artifacts.py verify-staged-release \
            --output release-publish \
            --contract tools/release_asset_contract.v1.json \
            --git-commit "$GITHUB_SHA" \
            --tag "$GITHUB_REF_NAME" \
            --cargo-lock Cargo.lock
          cat release-publish/SHA256SUMS
      - name: Attest aggregate checksums
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999
        with:
          subject-path: release-publish/SHA256SUMS
      - name: Attest exact release asset manifest
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999
        with:
          subject-path: release-publish/RELEASE-ASSETS.json
      - name: Create immutable release
        # gh release create fails atomically if this tag already has a release.
        # The eligibility job also rejects force-updated tag events before any
        # model or build work begins.
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            release-publish/*
