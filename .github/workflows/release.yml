name: release

# Build ready-to-run binaries for macOS (arm64 + x86_64), Linux (x86_64) and
# Windows (x86_64) and attach them to a GitHub Release.
#
# Triggers:
#   * push a tag `v*`   -> builds and publishes a Release with the assets
#   * manual dispatch   -> builds the assets and uploads them as workflow
#                          artifacts (no Release is created)
#
# Each job builds NATIVELY on its own runner (no cross-compilation), so the
# bundled C deps (tree-sitter grammars, SQLite) and the pure-Rust candle
# engine compile with the platform's own toolchain. The Rust version is the
# one pinned by rust-toolchain.toml.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create/attach the Release on tag builds

jobs:
  build:
    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # GPU-accelerated where the platform supports it; the binary always
          # runs on CPU when no GPU is present (Metal detected at runtime, CUDA
          # dynamically loaded — no hard cudart link, so it starts without CUDA).
          - name: macos-arm64
            os: macos-latest
            asset: greppy-macos-arm64.tar.gz
            features: metal
          # Pinned to 22.04: ubuntu-latest (24.04) links glibc 2.39, which
          # excludes every 22.04-LTS host (v0.1.0/v0.1.1 assets shipped with
          # that requirement — a real-world "GLIBC_2.39 not found" failure).
          # 22.04 builds run on anything with glibc >= 2.35.
          - name: linux-x86_64
            os: ubuntu-22.04
            asset: greppy-linux-x86_64.tar.gz
            features: cuda
            cuda_sub_packages: '["nvcc", "cudart"]'
            cuda_non_cuda_sub_packages: '["libcublas", "libcublas-dev"]'
          # v0.1.0: Windows ships a CPU binary (embedding on AVX2). Windows GPU
          # (CUDA) is deferred to v0.1.1 — nvcc's cudafe++ crashes on
          # windows-latest's newest MSVC. macOS Intel (macos-13) is also deferred
          # for now (scarce GitHub runners); Apple Silicon covers modern Macs.
          - name: windows-x86_64
            os: windows-latest
            asset: greppy-windows-x86_64.zip
            features: cpu
    steps:
      - uses: actions/checkout@v4

      - name: Fetch embedded model asset (LFS-tracked; CI checkout gets pointers)
        shell: bash
        run: |
          mkdir -p crates/cli/assets/embedded-model
          gh release download model-embeddinggemma-q4k-v1 \
            --repo "$GITHUB_REPOSITORY" \
            --dir crates/cli/assets/embedded-model --clobber
          ls -l crates/cli/assets/embedded-model
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install Rust (pinned by rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable

      # CUDA toolkit (nvcc + cuBLAS headers/import libs) so build.rs can
      # compile the vendored ggml-cuda kernels into the shared backend. No GPU
      # is needed at build time.
      - name: Install CUDA toolkit
        if: matrix.features == 'cuda'
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: '12.5.0'
          method: network
          sub-packages: ${{ matrix.cuda_sub_packages }}
          non-cuda-sub-packages: ${{ matrix.cuda_non_cuda_sub_packages }}

      - name: Add MSVC developer tools to PATH
        if: runner.os == 'Windows' && matrix.features == 'cuda'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build release binary
        run: cargo build --release --bin greppy --features embedded-model${{ matrix.features != 'cpu' && format(',{0}', matrix.features) || '' }}

      # Tag builds must ship a binary whose --version matches the tag —
      # v0.1.1 shipped reporting "grep 0.1.0" because the workspace version
      # was never bumped. Fails the release before any asset is published.
      - name: Assert --version matches the tag (Unix)
        if: startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows'
        run: |
          want="${GITHUB_REF_NAME#v}"
          got="$(target/release/greppy --version | awk '{print $NF}')"
          echo "tag=$want binary=$got"
          [ "$want" = "$got" ] || { echo "::error::version mismatch"; exit 1; }

      - name: Assert --version matches the tag (Windows)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'
        shell: pwsh
        run: |
          $want = $env:GITHUB_REF_NAME -replace '^v',''
          $got = (& target/release/greppy.exe --version).Split(' ')[-1]
          Write-Host "tag=$want binary=$got"
          if ($want -ne $got) { Write-Error "version mismatch"; exit 1 }

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/release/greppy dist/grep          # ship it under the name it runs as
          cp target/release/greppy dist/greppy       # and its own name
          cp README.md LICENSE dist/ 2>/dev/null || true
          tar -C dist -czf "${{ matrix.asset }}" .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/greppy.exe dist/greppy.exe
          Copy-Item README.md,LICENSE dist/ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist/* -DestinationPath "${{ matrix.asset }}" -Force

      - name: Upload workflow artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

      - name: Attach to Release (tag runs)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          fail_on_unmatched_files: true
