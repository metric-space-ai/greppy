name: agent benchmark release gate

on:
  push:
    branches: [main]
    paths:
      - crates/cli/assets/MODEL_ASSETS.json
  workflow_dispatch:
    inputs:
      parallel:
        description: Concurrent agent tasks
        required: true
        # 5 hit the 6-hour hosted-runner hard cap (job cancelled at exactly
        # 6h00); the tasks are API-bound, not CPU-bound, so 10 halves the
        # wall clock with the same runner.
        default: "10"

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  # Indexing the 12 pinned task repos is a multi-hour CPU embedding build.
  # Combined with the agent phase it blew the 6-hour hosted-runner hard cap
  # twice (runs 29269091343, 29292161251 - both cancelled at exactly 6h00).
  # The stores are deterministic in (model digests, task pins, corpus
  # generators), so prime them in their own job and cache the result; the
  # gate job restores the warm store and only pays a freshness validation.
  prime-store:
    name: prime task-repo stores
    runs-on: macos-latest
    timeout-minutes: 350
    steps:
      - name: Checkout exact candidate commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Restore model assets
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            crates/cli/assets/qwen35-0.8b-mtp-q4km/Qwen3.5-0.8B-MTP-Q4_K_M.gguf
            crates/cli/assets/qwen35-0.8b-mtp-q4km/tokenizer.json
            crates/cli/assets/embeddinggemma-300m-q4k/embeddinggemma-300M-Q4_K.gguf
            crates/cli/assets/embeddinggemma-300m-q4k/tokenizer.json
          key: model-assets-${{ hashFiles('crates/cli/assets/MODEL_ASSETS.json') }}
      - name: Fetch model assets (release-hosted, sha-pinned)
        shell: bash
        run: ./tools/fetch_model_assets.sh
      - name: Restore benchmark stores
        id: bench-store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ runner.temp }}/greppy-bench-store
          key: bench-store-v1-${{ hashFiles('crates/cli/assets/MODEL_ASSETS.json', 'bench/agent_efficiency/tasks_v2.json', 'bench/agent_efficiency/gen_corpus.sh', 'bench/agent_efficiency/real_corpus.py') }}
      - name: Install pinned Rust toolchain
        if: steps.bench-store.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: '1.95.0'
      - name: Build candidate binary with Metal
        if: steps.bench-store.outputs.cache-hit != 'true'
        run: cargo build --release --bin greppy --features metal
      - name: Materialize benchmark repositories
        if: steps.bench-store.outputs.cache-hit != 'true'
        run: |
          bash bench/agent_efficiency/gen_corpus.sh
          python3 bench/agent_efficiency/real_corpus.py setup \
            --repos serde flask gson zod tokio django
      - name: Reclaim build scratch disk before indexing
        if: steps.bench-store.outputs.cache-hit != 'true'
        run: |
          df -h "$GITHUB_WORKSPACE"
          mv target/release/greppy "${{ runner.temp }}/greppy-gate-bin"
          rm -rf target
          mkdir -p target/release
          mv "${{ runner.temp }}/greppy-gate-bin" target/release/greppy
          df -h "$GITHUB_WORKSPACE"
      - name: Build stores for every task repo
        if: steps.bench-store.outputs.cache-hit != 'true'
        env:
          GREPPY_BENCH_BIN: ${{ github.workspace }}/target/release/greppy
          GREPPY_STORE_DIR: ${{ runner.temp }}/greppy-bench-store
          RUN_DIR: ${{ runner.temp }}/greppy-store-prime
        run: |
          python3 bench/agent_efficiency/parallel_acceptance_run.py \
            --skip-build \
            --skip-verify \
            --index-only \
            --tasks tasks_v2.json \
            --agents grep,greppy,explorer \
            --output-dir "$RUN_DIR"

  benchmark:
    name: pinned Greppy vs explorer
    needs: prime-store
    runs-on: macos-latest
    timeout-minutes: 360
    steps:
      - name: Checkout exact candidate commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Restore model assets
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            crates/cli/assets/qwen35-0.8b-mtp-q4km/Qwen3.5-0.8B-MTP-Q4_K_M.gguf
            crates/cli/assets/qwen35-0.8b-mtp-q4km/tokenizer.json
            crates/cli/assets/embeddinggemma-300m-q4k/embeddinggemma-300M-Q4_K.gguf
            crates/cli/assets/embeddinggemma-300m-q4k/tokenizer.json
          key: model-assets-${{ hashFiles('crates/cli/assets/MODEL_ASSETS.json') }}

      - name: Fetch model assets (release-hosted, sha-pinned)
        shell: bash
        run: ./tools/fetch_model_assets.sh

      - name: Restore benchmark stores (primed)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ runner.temp }}/greppy-bench-store
          key: bench-store-v1-${{ hashFiles('crates/cli/assets/MODEL_ASSETS.json', 'bench/agent_efficiency/tasks_v2.json', 'bench/agent_efficiency/gen_corpus.sh', 'bench/agent_efficiency/real_corpus.py') }}

      - name: Install pinned Rust toolchain
        # dtolnay/rust-toolchain v1, pinned to an immutable source revision.
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: '1.95.0'

      - name: Install pinned Pi Code runner
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '25.9.0'

      - name: Verify pinned Pi Code runner
        run: |
          npm install --global @earendil-works/pi-coding-agent@0.80.2
          test "$(pi --version)" = "0.80.2"

      - name: Verify task-bank shape
        run: |
          test "$(jq length bench/agent_efficiency/tasks_v2.json)" -eq 115

      - name: Build candidate binary with Metal
        run: cargo build --release --bin greppy --features metal

      - name: Build graph-only task-bank audit helper
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/greppy-task-bank-target
        run: cargo build --bin greppy --features ci-test-assets

      - name: Materialize benchmark repositories
        run: |
          bash bench/agent_efficiency/gen_corpus.sh
          python3 bench/agent_efficiency/real_corpus.py setup \
            --repos serde flask gson zod tokio django

      - name: Verify pinned task and repository contract
        env:
          REALTASKS_GREPPY_BIN: ${{ runner.temp }}/greppy-task-bank-target/debug/greppy
        run: |
          python3 -m unittest discover -s bench/agent_efficiency -p 'test_*.py' -v
          python3 bench/agent_efficiency/verify_real_tasks.py

      - name: Reclaim build scratch disk before the gate
        # The macOS runner has ~14 GB of free disk. Two cargo target trees
        # (several GB each; the release binary alone embeds ~800 MB of model
        # weights) plus the benchmark corpora left too little headroom for
        # the per-repo greppy stores (django alone needs ~700 MB including
        # the extracted model): the 2026-07-13 gate run filled the disk
        # ~35 minutes into `greppy index django` and died with EXIT_IO (73),
        # `sqlite: database or disk is full`. Only the release binary is
        # read after this point — drop everything else and record the
        # headroom for future forensics.
        run: |
          df -h "$GITHUB_WORKSPACE"
          rm -rf "${{ runner.temp }}/greppy-task-bank-target"
          mv target/release/greppy "${{ runner.temp }}/greppy-gate-bin"
          rm -rf target
          mkdir -p target/release
          mv "${{ runner.temp }}/greppy-gate-bin" target/release/greppy
          df -h "$GITHUB_WORKSPACE"

      - name: Run pre-registered acceptance gate
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GREPPY_BENCH_BIN: ${{ github.workspace }}/target/release/greppy
          # Warm store from prime-store; the index step degrades to a fast
          # freshness validation instead of a multi-hour embedding build.
          GREPPY_STORE_DIR: ${{ runner.temp }}/greppy-bench-store
          RUN_DIR: ${{ runner.temp }}/greppy-agent-benchmark
        run: |
          test -n "$MINIMAX_API_KEY"
          python3 bench/agent_efficiency/parallel_acceptance_run.py \
            --skip-build \
            --skip-verify \
            --tasks tasks_v2.json \
            --agents grep,greppy,explorer \
            --parallel '${{ inputs.parallel || '10' }}' \
            --output-dir "$RUN_DIR"

      - name: Show gate verdict and aggregates (also on failure)
        if: always()
        env:
          RUN_DIR: ${{ runner.temp }}/greppy-agent-benchmark
        run: |
          for file in release-gate.json aggregate.txt SUMMARY.md; do
            if [ -s "$RUN_DIR/$file" ]; then
              echo "===== $file ====="
              cat "$RUN_DIR/$file"
            fi
          done

      - name: Upload gate diagnostics (also on failure, no raw traces)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: greppy-agent-benchmark-diagnostics-${{ github.sha }}
          retention-days: 30
          if-no-files-found: ignore
          path: |
            ${{ runner.temp }}/greppy-agent-benchmark/release-gate.json
            ${{ runner.temp }}/greppy-agent-benchmark/aggregate.txt
            ${{ runner.temp }}/greppy-agent-benchmark/SUMMARY.md
            ${{ runner.temp }}/greppy-agent-benchmark/FORENSICS_explorer_VS_greppy.md
            ${{ runner.temp }}/greppy-agent-benchmark/results.mechanical.json

      - name: Package publishable evidence without raw traces
        env:
          RUN_DIR: ${{ runner.temp }}/greppy-agent-benchmark
        run: |
          mkdir -p publish
          for file in \
            RUN_MANIFEST.json \
            results.json \
            results.mechanical.json \
            aggregate.txt \
            FORENSICS_explorer_VS_greppy.md \
            release-gate.json \
            SUMMARY.md
          do
            test -s "$RUN_DIR/$file"
            cp "$RUN_DIR/$file" publish/
          done
          test "$(jq -r .passed publish/release-gate.json)" = true
          test "$(jq -r .greppy.git_commit publish/RUN_MANIFEST.json)" = "$GITHUB_SHA"
          test "$(jq -r .raw_traces_published publish/RUN_MANIFEST.json)" = false
          tar -C publish -czf greppy-agent-benchmark.tar.gz .
          shasum -a 256 greppy-agent-benchmark.tar.gz > greppy-agent-benchmark.tar.gz.sha256

      - name: Attest benchmark evidence
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999
        with:
          subject-path: greppy-agent-benchmark.tar.gz

      - name: Upload benchmark evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: greppy-agent-benchmark-${{ github.sha }}
          retention-days: 90
          if-no-files-found: error
          path: |
            greppy-agent-benchmark.tar.gz
            greppy-agent-benchmark.tar.gz.sha256
