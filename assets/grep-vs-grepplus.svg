<svg viewBox="0 0 960 690" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">A grep agent versus a grepplus agent on one real benchmark task</title>
  <desc id="desc">On task r047, the grep agent runs 5 tool calls reading 2761 bytes; the grepplus agent runs 2 tool calls reading 1202 bytes. Both reach the same correct answer, _split_blueprint_path in src/flask/helpers.py.</desc>
  <rect width="960" height="690" fill="#ffffff"/>

  <!-- header -->
  <text x="36" y="42" font-size="22" font-weight="700" fill="#0f172a">One real task — a grep agent vs a grepplus agent</text>
  <text x="36" y="66" font-size="13" fill="#64748b">Benchmark task r047 · Flask · the same MiniMax-M3 coding agent · both reach the correct answer</text>

  <!-- question -->
  <rect x="36" y="82" width="888" height="52" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="52" y="106" font-size="13.5" fill="#334155"><tspan font-weight="600">Question:</tspan> “Which routine expands a dotted nesting name into all of its ancestor prefixes?”</text>
  <text x="52" y="125" font-size="12" fill="#94a3b8">Answer in the code: <tspan font-family="ui-monospace,Menlo,monospace" fill="#64748b">_split_blueprint_path</tspan> in src/flask/helpers.py — not one word of the question appears in the code.</text>

  <!-- drop-in banner -->
  <rect x="36" y="146" width="888" height="44" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="52" y="166" font-size="12.5" fill="#4338ca"><tspan font-weight="700">grepplus is a drop-in for grep</tspan> — you install it as <tspan font-family="ui-monospace,Menlo,monospace">grep</tspan>. Every plain grep call still works byte-for-byte;</text>
  <text x="52" y="183" font-size="12.5" fill="#4338ca">the agent simply gains <tspan font-family="ui-monospace,Menlo,monospace">context</tspan> / <tspan font-family="ui-monospace,Menlo,monospace">brief</tspan> / <tspan font-family="ui-monospace,Menlo,monospace">who-calls</tspan> from the very same binary.</text>

  <!-- column headers -->
  <text x="36" y="216" font-size="14" font-weight="700" fill="#b91c1c">AGENT USING grep</text>
  <text x="36" y="233" font-size="11.5" fill="#9ca3af">matches text → keeps guessing the vocabulary</text>
  <text x="494" y="216" font-size="14" font-weight="700" fill="#15803d">AGENT USING grepplus</text>
  <text x="494" y="233" font-size="11.5" fill="#9ca3af">matches meaning → one semantic query</text>

  <!-- ================= LEFT: grep chain (5 blocks) ================= -->
  <g font-family="ui-monospace,Menlo,monospace">
    <!-- block 1 -->
    <rect x="36" y="242" width="430" height="54" rx="7" fill="#fef2f2" stroke="#fecaca"/>
    <circle cx="58" cy="269" r="12" fill="#fca5a5"/><text x="58" y="273" font-size="12" font-weight="700" fill="#7f1d1d" text-anchor="middle">1</text>
    <text x="80" y="265" font-size="10.5" fill="#7f1d1d">grep -rn "split.*['\"]\.['\"]" --include=*.py -l</text>
    <text x="80" y="284" font-size="10" font-family="-apple-system" fill="#b91c1c">regex guess for a dotted split — no match</text>
    <rect x="404" y="256" width="52" height="18" rx="9" fill="#fee2e2"/><text x="430" y="269" font-size="10" fill="#991b1b" text-anchor="middle" font-family="-apple-system">91 B</text>
    <!-- block 2 -->
    <rect x="36" y="304" width="430" height="54" rx="7" fill="#fef2f2" stroke="#fecaca"/>
    <circle cx="58" cy="331" r="12" fill="#fca5a5"/><text x="58" y="335" font-size="12" font-weight="700" fill="#7f1d1d" text-anchor="middle">2</text>
    <text x="80" y="327" font-size="10.5" fill="#7f1d1d">ls -la</text>
    <text x="80" y="346" font-size="10" font-family="-apple-system" fill="#b91c1c">lists the tree to orient</text>
    <rect x="394" y="318" width="62" height="18" rx="9" fill="#fee2e2"/><text x="425" y="331" font-size="10" fill="#991b1b" text-anchor="middle" font-family="-apple-system">1,216 B</text>
    <!-- block 3 -->
    <rect x="36" y="366" width="430" height="54" rx="7" fill="#fef2f2" stroke="#fecaca"/>
    <circle cx="58" cy="393" r="12" fill="#fca5a5"/><text x="58" y="397" font-size="12" font-weight="700" fill="#7f1d1d" text-anchor="middle">3</text>
    <text x="80" y="389" font-size="10.5" fill="#7f1d1d">grep -n "split.*['\"]\." app.py helpers.py …</text>
    <text x="80" y="408" font-size="10" font-family="-apple-system" fill="#b91c1c">narrower guess across likely files</text>
    <rect x="404" y="380" width="52" height="18" rx="9" fill="#fee2e2"/><text x="430" y="393" font-size="10" fill="#991b1b" text-anchor="middle" font-family="-apple-system">535 B</text>
    <!-- block 4 -->
    <rect x="36" y="428" width="430" height="54" rx="7" fill="#fef2f2" stroke="#fecaca"/>
    <circle cx="58" cy="455" r="12" fill="#fca5a5"/><text x="58" y="459" font-size="12" font-weight="700" fill="#7f1d1d" text-anchor="middle">4</text>
    <text x="80" y="451" font-size="10.5" fill="#7f1d1d">grep -rn "_split_blueprint_path" src/</text>
    <text x="80" y="470" font-size="10" font-family="-apple-system" fill="#b91c1c">finally greps the real name — found it</text>
    <rect x="404" y="442" width="52" height="18" rx="9" fill="#fee2e2"/><text x="430" y="455" font-size="10" fill="#991b1b" text-anchor="middle" font-family="-apple-system">488 B</text>
    <!-- block 5 -->
    <rect x="36" y="490" width="430" height="54" rx="7" fill="#fef2f2" stroke="#fecaca"/>
    <circle cx="58" cy="517" r="12" fill="#fca5a5"/><text x="58" y="521" font-size="12" font-weight="700" fill="#7f1d1d" text-anchor="middle">5</text>
    <text x="80" y="513" font-size="10.5" fill="#7f1d1d">read helpers.py:640–655</text>
    <text x="80" y="532" font-size="10" font-family="-apple-system" fill="#b91c1c">opens the file to confirm the body</text>
    <rect x="404" y="504" width="52" height="18" rx="9" fill="#fee2e2"/><text x="430" y="517" font-size="10" fill="#991b1b" text-anchor="middle" font-family="-apple-system">431 B</text>
  </g>
  <rect x="36" y="554" width="430" height="30" rx="7" fill="#fee2e2"/>
  <text x="52" y="573" font-size="11.5" font-weight="600" fill="#7f1d1d">5 tool calls · 2,761 bytes read — answer on the 5th</text>

  <!-- ================= RIGHT: grepplus chain (2 blocks) ================= -->
  <g font-family="ui-monospace,Menlo,monospace">
    <!-- block 1 -->
    <rect x="494" y="242" width="430" height="54" rx="7" fill="#f0fdf4" stroke="#bbf7d0"/>
    <circle cx="516" cy="269" r="12" fill="#86efac"/><text x="516" y="273" font-size="12" font-weight="700" fill="#14532d" text-anchor="middle">1</text>
    <text x="538" y="265" font-size="10.5" fill="#14532d">grepplus context "expand a dotted nesting name…"</text>
    <text x="538" y="284" font-size="10" font-family="-apple-system" fill="#15803d">semantic match → _split_blueprint_path (no shared word)</text>
    <rect x="862" y="256" width="52" height="18" rx="9" fill="#dcfce7"/><text x="888" y="269" font-size="10" fill="#166534" text-anchor="middle" font-family="-apple-system">545 B</text>
    <!-- block 2 -->
    <rect x="494" y="304" width="430" height="54" rx="7" fill="#f0fdf4" stroke="#bbf7d0"/>
    <circle cx="516" cy="331" r="12" fill="#86efac"/><text x="516" y="335" font-size="12" font-weight="700" fill="#14532d" text-anchor="middle">2</text>
    <text x="538" y="327" font-size="10.5" fill="#14532d">grepplus brief _split_blueprint_path</text>
    <text x="538" y="346" font-size="10" font-family="-apple-system" fill="#15803d">definition + callers + callees in one call → done</text>
    <rect x="862" y="318" width="52" height="18" rx="9" fill="#dcfce7"/><text x="888" y="331" font-size="10" fill="#166534" text-anchor="middle" font-family="-apple-system">657 B</text>
  </g>
  <!-- "already answered" zone mirroring grep's extra rounds -->
  <rect x="494" y="366" width="430" height="178" rx="7" fill="#f6fef9" stroke="#bbf7d0" stroke-dasharray="5 5"/>
  <text x="709" y="452" font-size="12.5" font-weight="600" fill="#16a34a" text-anchor="middle">already answered.</text>
  <text x="709" y="472" font-size="11" fill="#4ade80" text-anchor="middle" font-family="-apple-system">grep needed 3 more rounds to reach the same place.</text>
  <rect x="494" y="554" width="430" height="30" rx="7" fill="#dcfce7"/>
  <text x="510" y="573" font-size="11.5" font-weight="600" fill="#14532d">2 tool calls · 1,202 bytes read — answer on the 2nd</text>

  <!-- factor bar -->
  <rect x="36" y="600" width="888" height="46" rx="10" fill="#0f172a"/>
  <g font-size="15" font-weight="800" fill="#ffffff" font-family="-apple-system">
    <text x="120" y="629" text-anchor="middle">2.5× fewer tool calls</text>
    <text x="410" y="629" text-anchor="middle">2.3× fewer bytes read</text>
    <text x="720" y="629" text-anchor="middle">same correct answer</text>
  </g>

  <!-- honest footnote -->
  <text x="36" y="668" font-size="10.5" fill="#94a3b8">One illustrative task. Median across the benchmark: ~3–4× fewer billed tokens and ~2× faster end-to-end. Against an uncoached agent that</text>
  <text x="36" y="682" font-size="10.5" fill="#94a3b8">reads freely (no discipline), the same r047 task took 33 tool calls — 16× more model rounds than grepplus. Its lead grows the less careful the agent is.</text>
</svg>
