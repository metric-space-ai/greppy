<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 344" font-family="system-ui,Segoe UI,Roboto,sans-serif">
  <rect width="760" height="344" fill="#ffffff"/>
  <text x="24" y="34" font-size="16" font-weight="600" fill="#0b0b0b">The agent answers correctly more often &#8212; at fewer tokens</text>
  <text x="24" y="56" font-size="11.5" fill="#5f5e5a">14 models &#215; 35 code-navigation tasks &#215; 7 real repos (Rust / Python / Java / TypeScript / Go) &#183; same agent, grep vs greppy</text>

  <rect x="590" y="26" width="12" height="12" fill="#d3d1c7"/>
  <text x="607" y="36" font-size="11" fill="#898781">grep</text>
  <rect x="648" y="26" width="12" height="12" fill="#1a9e75"/>
  <text x="665" y="36" font-size="11" fill="#0f6e56">greppy</text>

  <text x="24" y="92" font-size="12.5" font-weight="600" fill="#0b0b0b">Correct answers &#8212; % that name the ground-truth code (floor-graded)</text>

  <line x1="210" y1="102" x2="210" y2="230" stroke="#e6e4dc" stroke-width="1"/>
  <line x1="710" y1="102" x2="710" y2="230" stroke="#efeee8" stroke-width="1"/>
  <text x="694" y="246" font-size="9" fill="#b8b6ad">100%</text>

  <text x="24" y="120" font-size="11" fill="#5f5e5a">Structural navigation</text>
  <text x="24" y="134" font-size="9.5" fill="#a3a199">who-calls / callees / impact / find-symbol</text>
  <rect x="210" y="104" width="266" height="22" fill="#d3d1c7"/>
  <text x="483" y="120" font-size="11" fill="#898781">grep 53%</text>
  <rect x="210" y="132" width="437" height="22" fill="#1a9e75"/>
  <text x="654" y="148" font-size="11" font-weight="600" fill="#0f6e56">greppy 87%</text>

  <text x="24" y="194" font-size="11" fill="#5f5e5a">All questions</text>
  <text x="24" y="208" font-size="9.5" fill="#a3a199">structural + semantic</text>
  <rect x="210" y="178" width="316" height="22" fill="#d3d1c7"/>
  <text x="533" y="194" font-size="11" fill="#898781">grep 63%</text>
  <rect x="210" y="206" width="450" height="22" fill="#1a9e75"/>
  <text x="667" y="222" font-size="11" font-weight="600" fill="#0f6e56">greppy 90%</text>

  <line x1="24" y1="264" x2="736" y2="264" stroke="#e6e4dc" stroke-width="1"/>
  <text x="24" y="290" font-size="12.5" font-weight="600" fill="#0b0b0b">&#8230; and fewer tokens getting there</text>
  <text x="24" y="310" font-size="11.5" fill="#5f5e5a">On those structural tasks greppy uses a median <tspan font-weight="600" fill="#0f6e56">1.2&#215; fewer input tokens</tspan>, <tspan font-weight="600" fill="#0f6e56">1.7&#215; less search-context</tspan>, <tspan font-weight="600" fill="#0f6e56">1.2&#215; fewer output</tspan></text>
  <text x="24" y="329" font-size="11.5" fill="#5f5e5a">&#8212; and 2&#8211;5&#215; on the hard cases (mean): one resolved <tspan font-family="ui-monospace,Menlo,Consolas,monospace" fill="#0b0b0b">greppy who-calls</tspan> replaces a grep-and-read spiral.</text>
</svg>
